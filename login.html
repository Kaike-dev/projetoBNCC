<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Prospec Edu</title>
    <link rel="icon" type="image/png" href="img/favicon.png">
    <link href="https://fonts.googleapis.com/css2?family=Segoe+UI:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <div class="login-wrapper">
        
        <div class="login-banner">
            <div class="banner-content">
                <img src="img/Mascote_Edu(Sem_Fundo).png" alt="Mascote Edu" class="mascot-img">
                <h1>Uma nova <br><span class="text-purple">perspectiva educacional</span></h1>
                <p>Acesse a plataforma e transforme a BNCC da computação de teoria em prática no seu município.</p>
            </div>
        </div>

        <div class="login-aside">
            
            <button id="theme-toggle" class="theme-btn" aria-label="Alternar Tema">
                <i class="fas fa-moon"></i>
            </button>

            <div class="form-container">
                <a href="index.html" class="back-link"><i class="fas fa-arrow-left"></i> Voltar ao site</a>
                
                <div class="form-header">
                    <img src="img/logo-prospecto.png" alt="Prospec Edu" class="form-logo">
                    <h2>Bem-vindo de volta!</h2>
                </div>

                <form action="#">
                    <div class="input-group">
                        <label for="email">E-mail ou CPF</label>
                        <input type="text" id="email" placeholder="Digite seu e-mail ou CPF" required>
                    </div>
                    
                    <div class="input-group">
                        <label for="password">Senha</label>
                        <input type="password" id="password" placeholder="Digite sua senha" required>
                    </div>

                    <button type="submit" class="btn-login">Entrar</button>
                </form>

                <div class="form-footer">
                    <a href="#" class="forgot-password">Esqueceu a senha?</a>
                    
                    <div class="divider">
                        <span>ou</span>
                    </div>
                    
                    <button class="btn-register-new">Criar nova conta</button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/login.js"></script>
</body>
</html>
